name: Build RoboticsStudio AppImage

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake patchelf libfuse2 \
          libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev libglfw3-dev \
          libx11-dev libwayland-dev \
          libcups2-dev libfontconfig1-dev libfreetype-dev \
          libxkbcommon-dev libxkbcommon-x11-0 \
          libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
          libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
          libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1

    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.10.2'
        modules: 'qt3d'

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build RoboticsStudio
      run: cmake --build build --config Release -j$(nproc)

    - name: Download linuxdeploy
      run: |
        wget -c "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -c "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        chmod +x linuxdeploy*.AppImage 

    - name: Package AppImage
      run: |
        mkdir -p AppDir/usr/lib
        
        cp -a extern/mujoco-3.3.7/lib/libmujoco.so* AppDir/usr/lib/

        export QMAKE=$(which qmake)
        
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          -e build/RoboticsStudio \
          -d src/UI/Resources/RoboticsStudio.desktop \
          -i src/UI/Resources/icon.png \
          --plugin qt

        patchelf --set-rpath '$ORIGIN/../lib' AppDir/usr/bin/RoboticsStudio

        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

    - name: Upload AppImage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RoboticsStudio-Linux-x86_64
        path: "RoboticsStudio*.AppImage"

    - name: Publish to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: "RoboticsStudio*.AppImage"
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

    # --- NEW STEP: Deploy Models to GitHub Pages ---
    - name: Deploy Models to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./models
        destination_dir: models
        keep_files: true